<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYBERPUNK FORM // SYSTEM ACCESS</title>
  
  <!-- Підключення футуристичних шрифтів Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #030611;
      --card-bg: rgba(6, 12, 32, 0.85);
      --neon-blue: #00f0ff;
      --neon-pink: #ff007f;
      --neon-purple: #9d4edd;
      --text-main: #00f0ff;
      --text-sec: #e2e8f0;
      --text-muted: #64748b;
      --border-glow: rgba(0, 240, 255, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      font-family: 'Rajdhani', sans-serif;
      color: var(--text-sec);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px 20px;
      overflow-x: hidden;
      position: relative;
    }

    /* Фонова кіберпанк-сітка */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
      background-size: 30px 30px;
      background-position: center;
      z-index: -2;
    }

    /* Ефект неонового туману */
    body::after {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0, 240, 255, 0.08) 0%, rgba(255, 0, 127, 0.03) 50%, rgba(0,0,0,0) 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: -1;
      pointer-events: none;
    }

    /* Анімована лінія сканування (CRT-ефект) */
    .scanlines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        rgba(18, 16, 16, 0) 50%, 
        rgba(0, 0, 0, 0.25) 50%
      ), linear-gradient(
        90deg,
        rgba(255, 0, 0, 0.06),
        rgba(0, 255, 0, 0.02),
        rgba(0, 0, 255, 0.06)
      );
      background-size: 100% 4px, 6px 100%;
      z-index: 100;
      pointer-events: none;
      opacity: 0.7;
    }

    .container {
      width: 100%;
      max-width: 550px;
      background: var(--card-bg);
      border: 2px solid var(--neon-blue);
      border-radius: 4px;
      padding: 40px;
      box-shadow: 
        0 0 15px rgba(0, 240, 255, 0.15),
        inset 0 0 15px rgba(0, 240, 255, 0.1);
      position: relative;
      /* Зрізані кіберпанк-кути */
      clip-path: polygon(
        0px 20px, 
        20px 0px, 
        100% 0px, 
        100% calc(100% - 20px), 
        calc(100% - 20px) 100%, 
        0px 100%
      );
    }

    /* Кутові декоративні елементи */
    .corner-decor {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    
    .corner-decor::before {
      content: 'SYS.LOC // 4.3';
      position: absolute;
      bottom: 8px;
      right: 15px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--neon-pink);
      letter-spacing: 1px;
      opacity: 0.7;
    }

    .corner-decor::after {
      content: 'ONLINE';
      position: absolute;
      top: 10px;
      right: 20px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: #10b981;
      text-shadow: 0 0 5px #10b981;
      letter-spacing: 1px;
    }

    /* Кіберпанк заголовок */
    h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 22px;
      font-weight: 900;
      color: #ffffff;
      text-shadow: 0 0 8px rgba(0, 240, 255, 0.6);
      letter-spacing: 2px;
      margin-bottom: 5px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h2 span {
      color: var(--neon-pink);
      text-shadow: 0 0 8px rgba(255, 0, 127, 0.6);
    }

    .subtitle {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: var(--neon-blue);
      text-transform: uppercase;
      margin-bottom: 30px;
      border-bottom: 1px solid rgba(0, 240, 255, 0.2);
      padding-bottom: 10px;
    }

    .form-group {
      margin-bottom: 22px;
      position: relative;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    /* Стилізація назв полів */
    label {
      display: block;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      text-transform: uppercase;
      margin-bottom: 8px;
      color: var(--neon-blue);
      letter-spacing: 1px;
      text-shadow: 0 0 3px rgba(0, 240, 255, 0.3);
    }

    label span.req {
      color: var(--neon-pink);
      text-shadow: 0 0 5px var(--neon-pink);
      margin-left: 2px;
    }

    /* Стилі для інпутів */
    input, textarea {
      width: 100%;
      background: rgba(3, 8, 24, 0.8);
      border: 1px solid var(--neon-blue);
      border-radius: 0px; /* Тільки гострі кути */
      padding: 12px 16px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      color: #ffffff;
      outline: none;
      transition: all 0.3s ease;
      box-shadow: inset 0 0 5px rgba(0, 240, 255, 0.05);
    }

    input:focus, textarea:focus {
      border-color: var(--neon-pink);
      box-shadow: 
        0 0 10px rgba(255, 0, 127, 0.3),
        inset 0 0 5px rgba(255, 0, 127, 0.1);
      background: rgba(3, 8, 24, 0.95);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    /* Підказки або індикатори всередині полів */
    .input-wrapper::after {
      content: '';
      position: absolute;
      right: 12px;
      top: 38px;
      width: 4px;
      height: 4px;
      background: var(--neon-blue);
      box-shadow: 0 0 5px var(--neon-blue);
    }
    
    .input-wrapper:focus-within::after {
      background: var(--neon-pink);
      box-shadow: 0 0 5px var(--neon-pink);
    }

    /* Кіберпанк кнопка */
    .btn-submit {
      width: 100%;
      background: transparent;
      border: 1px solid var(--neon-pink);
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #ffffff;
      text-transform: uppercase;
      padding: 15px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      /* Зрізані кути кнопки */
      clip-path: polygon(0 0, 93% 0, 100% 35%, 100% 100%, 7% 100%, 0 65%);
      box-shadow: 0 0 10px rgba(255, 0, 127, 0.15);
      margin-top: 15px;
    }

    .btn-submit::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg, 
        transparent, 
        rgba(0, 240, 255, 0.3), 
        transparent
      );
      transition: all 0.6s ease;
    }

    .btn-submit:hover {
      background: var(--neon-pink);
      color: #000000;
      text-shadow: none;
      box-shadow: 0 0 20px var(--neon-pink);
    }

    .btn-submit:hover::before {
      left: 100%;
    }

    .btn-submit:active {
      transform: scale(0.98);
    }

    /* Екран успішної відправки (Термінал зламано) */
    .success-container {
      display: none;
      text-align: center;
      padding: 10px 0;
      animation: terminalGlitch 0.4s ease-out forwards;
    }

    .terminal-header {
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      color: var(--neon-pink);
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      gap: 15px;
    }

    .success-icon {
      font-family: 'Orbitron', sans-serif;
      font-size: 48px;
      color: var(--neon-blue);
      text-shadow: 0 0 15px var(--neon-blue);
      margin-bottom: 20px;
    }

    .success-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 20px;
      font-weight: 900;
      color: #ffffff;
      text-shadow: 0 0 8px rgba(0, 240, 255, 0.5);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .success-message {
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      color: var(--text-sec);
      line-height: 1.6;
      background: rgba(0, 240, 255, 0.05);
      border: 1px dashed var(--neon-blue);
      padding: 15px;
    }

    /* Анімація появи терміналу */
    @keyframes terminalGlitch {
      0% { opacity: 0; transform: scale(0.95); filter: hue-rotate(90deg); }
      50% { opacity: 0.5; transform: scale(1.02); filter: hue-rotate(-45deg); }
      100% { opacity: 1; transform: scale(1); filter: none; }
    }

    @media (max-width: 500px) {
      .form-row {
        grid-template-columns: 1fr;
        gap: 0;
      }
      .container {
        padding: 25px;
      }
    }
  </style>
</head>
<body>

  <!-- Лінії сканування монітора -->
  <div class="scanlines"></div>

  <div class="container">
    <div class="corner-decor"></div>
    
    <!-- Стан форми -->
    <form id="requestForm">
      <h2><span>//</span> SYS_CONNECT</h2>
      <p class="subtitle">INPUT PROTOCOL // UPLOAD REQUEST TO N8N</p>

      <div class="form-group input-wrapper">
        <label for="name">[ 01. USER_NAME ]<span class="req">*</span></label>
        <input type="text" id="name" name="name" required placeholder="ENTR_NAME">
      </div>

      <div class="form-group input-wrapper">
        <label for="email">[ 02. USER_EMAIL ]<span class="req">*</span></label>
        <input type="email" id="email" name="email" required placeholder="ENTR_EMAIL">
      </div>

      <div class="form-group input-wrapper">
        <label for="company">[ 03. COMP_NAME ]<span class="req">*</span></label>
        <input type="text" id="company" name="company" required placeholder="ENTR_COMPANY">
      </div>

      <div class="form-group input-wrapper">
        <label for="request">[ 04. REQUEST_DETAILS ]<span class="req">*</span></label>
        <textarea id="request" name="request" required placeholder="ENTR_DETAILS..."></textarea>
      </div>

      <div class="form-row">
        <div class="form-group input-wrapper">
          <label for="budget">[ 05. EST_BUDGET ]</label>
          <input type="text" id="budget" name="budget" placeholder="ENTR_BUDGET">
        </div>
        <div class="form-group input-wrapper">
          <label for="deadline">[ 06. TIMELINE ]</label>
          <input type="text" id="deadline" name="deadline" placeholder="ENTR_DEADLINE">
        </div>
      </div>

      <div class="form-group input-wrapper">
        <label for="website">[ 07. COMP_WEBSITE ]</label>
        <input type="text" id="website" name="website" placeholder="ENTR_WEBSITE">
      </div>

      <button type="submit" class="btn-submit">RUN_TRANSMISSION</button>
    </form>

    <!-- Стан успіху (Термінальний лог) -->
    <div id="successState" class="success-container">
      <div class="terminal-header">
        <span>[ STATUS: OK ]</span>
        <span>[ PORT: 443 ]</span>
      </div>
      <div class="success-icon">>>> CONNECTION TERMINATED</div>
      <h3 class="success-title">Okay, goodbye</h3>
      <p class="success-message">
        SYSTEM: Заявку прийнято. Сесію закрито.<br>
        DATA: Всі пакети успішно відправлено на n8n.<br>
        STATUS: DISCONNECTED.
      </p>
    </div>
  </div>

  <script>
    // Вставте сюди свій URL з Webhook n8n замість '__WEBHOOK_URL__'
    const webhookUrl = 'https://albasever.app.n8n.cloud/webhook/form_from_marko';

    document.getElementById('requestForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const submitButton = this.querySelector('.btn-submit');
      const originalText = submitButton.innerText;
      submitButton.disabled = true;
      submitButton.innerText = 'TRANSMITTING...';

      const formData = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        company: document.getElementById('company').value,
        request: document.getElementById('request').value,
        budget: document.getElementById('budget').value,
        deadline: document.getElementById('deadline').value,
        website: document.getElementById('website').value
      };

      try {
        const response = await fetch(webhookUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(formData)
        });

        if (response.ok) {
          // Ховаємо форму, показуємо екран успіху
          document.getElementById('requestForm').style.display = 'none';
          document.getElementById('successState').style.display = 'block';
        } else {
          alert('SYSTEM ERROR: RESPONSE CODE ' + response.status);
          submitButton.disabled = false;
          submitButton.innerText = originalText;
        }
      } catch (error) {
        console.error('Transmission error:', error);
        alert('SYSTEM ERROR: TRANSMISSION FAILED');
        submitButton.disabled = false;
        submitButton.innerText = originalText;
      }
    });
  </script>

</body>
</html>
